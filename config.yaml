# tickers_watchlist configuration
# The tickers to track. Held names get full position math; watch-only names
# (no entry in data/holdings.json) still get prices, technicals, news & earnings.
tickers:
  - AAPL
  - NVDA
  - MSFT

timezone: America/New_York
benchmark: SPY          # relative-strength benchmark
min_position_usd: 200   # floor when trimming
history_days: 400       # >200 so the 200-day MA is available
news_lookback_days: 4
max_news_per_ticker: 8

# Overnight / global markets shown in the brief (Asia + Europe are live at 9am ET;
# futures point at the US open). Defaults live in sources.GLOBAL_MARKETS_DEFAULT;
# uncomment to override. Each entry needs symbol (yfinance), label, region.
# global_markets:
#   - {symbol: "^N225", label: "Nikkei 225", region: "Asia"}
#   - {symbol: "^KS11", label: "KOSPI", region: "Asia"}
#   - {symbol: "^STOXX50E", label: "Euro Stoxx 50", region: "Europe"}
#   - {symbol: "ES=F", label: "S&P 500 fut", region: "US futures"}

# Optional: map a ticker to its sector ETF for sector-relative strength later.
sector_etf:
  AAPL: XLK
  NVDA: XLK
  MSFT: XLK

# Theme bucket per ticker. Purely descriptive ground truth: the pipeline rolls these
# up into snapshot.portfolio.composition (counts + member lists per theme) so the
# routine grounds portfolio-LEVEL claims ("the only healthcare name", "two GLP-1
# names", "most of the book is semis") in data instead of recall. Names tracked but
# absent here show up under composition.untagged so a missing tag is visible.
# Granular on purpose — coarse groupings (e.g. "the AI complex") are unions of these.
theme:
  # --- semis / AI hardware-software complex ---
  MU: memory
  SNDK: memory
  AMAT: semicap equipment
  KLAC: semicap equipment
  LRCX: semicap equipment
  ASML: semicap equipment
  TSM: foundry
  NVDA: AI silicon
  AVGO: AI silicon
  MRVL: AI silicon
  COHR: optical/connectivity
  LITE: optical/connectivity
  CRDO: optical/connectivity
  CRWV: AI infrastructure
  CRWD: software
  NOW: software
  CEVA: semiconductor IP
  # --- off the semis/AI complex ---
  LLY: healthcare/GLP-1
  HIMS: healthcare/GLP-1
  MP: rare-earth materials
  OUST: lidar
  IONQ: quantum computing
  # --- sample/file-mode names ---
  AAPL: consumer tech
  MSFT: software

# Thresholds for the rule-based signal layer (the routine refines the final call).
signals:
  rsi_overbought: 70
  rsi_oversold: 30                 # PLAN-v2 decision #1 (30/70 Wilder bands)
  rel_vol_spike: 2.0
  extended_above_sma20_pct: 12.0   # far above 20d MA -> trim watch
  earnings_soon_days: 7
  # PROVISIONAL (P4b): a trim needs >=2 deterioration dimensions incl >=1 hard;
  # soft-only confluence -> hold + Review badge. Tune with backtest evidence.
  hard_dimensions: [downtrend, revenue_weakening, margin_severe]
